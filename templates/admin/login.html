<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ELSF</title>
  <link rel="icon" href="/asset/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/asset/favicon.svg">
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login">
    <img src="/admin/assets/log.png" alt="ELSF" class="admin-logo">
    <h1>Owner Login</h1>
    <!-- Flash messages (e.g. "Incorrect password.") set by admin_login() in app.py -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <input type="password" name="password" placeholder="Admin password" required autofocus>
      <button type="submit" class="btn-brand">Log in</button>
    </form>
    <a href="/asset/index.html" class="admin-back">&larr; Back to website</a>
  </div>
</body>
</html>
